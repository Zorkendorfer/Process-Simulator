# ── Simulator ────────────────────────────────────────────────────────────────
flowsheet_json: "examples/distillation_recycle.json"
component_db:   "data/components.json"
col_unit:       "COL1"
feed_stream:    "FEED"

# ── Environment ───────────────────────────────────────────────────────────────
max_steps: 1   # bandit mode — one solve per episode

# ── Reward ────────────────────────────────────────────────────────────────────
reward:
  target_purity:       0.85   # METHANE mole fraction in distillate
  min_distillate_flow: 10.0   # mol/s
  w_purity:            10.0
  w_energy:             1.0
  w_flow:               2.0
  w_crash:            -20.0
  purity_reward_type:  "smooth"

# ── Training ──────────────────────────────────────────────────────────────────
total_timesteps: 500_000
n_envs:          4
lr:              3.0e-4
n_steps:         2048
batch_size:      64
n_epochs:        10
gamma:           0.99
gae_lambda:      0.95
clip_range:      0.2
ent_coef:        0.01     # increase to 0.05 if reward is flat after 20k steps

# ── Logging ───────────────────────────────────────────────────────────────────
log_dir:        "runs/ppo_baseline"
checkpoint_dir: "checkpoints/ppo_baseline"
eval_freq:      5_000
save_freq:      20_000
